{% assign game_url = '/futures-game/' | relative_url %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url={{ game_url }}">
  <link rel="canonical" href="{{ '/futures-game/' | absolute_url }}">
  <title>正在进入期货游戏…</title>
  <script>
    window.location.replace({{ game_url | jsonify }});
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 1.5rem;">
    正在跳转至 <a href="{{ game_url }}">期货模拟游戏</a>…
  </p>
</body>
</html>
